<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic tac toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div id="status" class="status">Waiting for game...</div>
        </header>

        <main>
            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="btn">Restart Game</button>
            <div id="join-section" class="join-section hidden">
                <input type="text" id="player-name" placeholder="Your Name">
                <div class="role-selection">
                    <button class="btn join-btn" data-symbol="X">Join as X</button>
                    <button class="btn join-btn" data-symbol="O">Join as O</button>
                </div>
            </div>
        </footer>
    </div>
    <script src="game.js"></script>
</body>

</html>
